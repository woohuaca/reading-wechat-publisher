<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f3e8;
        --panel: #fffdf8;
        --ink: #1f2933;
        --muted: #66788a;
        --accent: #0f766e;
        --line: #d9d0bf;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 32%),
          linear-gradient(180deg, #fcfaf4 0%, var(--paper) 100%);
        color: var(--ink);
      }
      main {
        width: min(760px, calc(100vw - 28px));
        margin: 24px auto 48px;
        padding: 24px 18px 36px;
        background: var(--panel);
        border: 1px solid rgba(217, 208, 191, 0.9);
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(70, 56, 33, 0.09);
      }
      header {
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 7vw, 42px);
        line-height: 1.16;
        letter-spacing: -0.02em;
      }
      .meta {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }
      .cover {
        width: 100%;
        margin: 18px 0 26px;
        border-radius: 18px;
        overflow: hidden;
        background: #ebe4d2;
      }
      .cover img {
        width: 100%;
        display: block;
      }
      article {
        font-size: 17px;
        line-height: 1.9;
      }
      article h2,
      article h3 {
        scroll-margin-top: 18px;
      }
      footer {
        margin-top: 32px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>{{TITLE}}</h1>
        <div class="meta">{{META}}</div>
      </header>
      {{COVER}}
      <article>
        {{BODY}}
      </article>
      <footer>Preview generated by reading-wechat-publisher.</footer>
    </main>
  </body>
</html>
